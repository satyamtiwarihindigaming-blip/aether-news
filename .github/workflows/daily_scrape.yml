name: Tech News Automation Engine

on:
  schedule:
    # Runs every 3 hours (8 times a day)
    - cron: '0 */3 * * *'
  push:
    branches: ["main"]
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

permissions:
  contents: write # Allows committing changes to posts.json fallback
  pages: write # Allows deploying to GitHub Pages
  id-token: write # Required for GitHub Pages deployment authentication

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f scraper/requirements.txt ]; then
          pip install -r scraper/requirements.txt
        else
          pip install -r requirements.txt || echo "No requirements.txt found"
        fi

    - name: Execute Scraper Pipeline
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      run: |
        if [ -f scraper/scraper.py ]; then
          python scraper/scraper.py
        else
          python scraper.py
        fi

    - name: Push Database Fallback (if Supabase not used)
      run: |
        git config --global user.name "AetherScraper[bot]"
        git config --global user.email "aetherscraper-bot@users.noreply.github.com"
        
        # Check if posts.json was changed
        git add posts.json
        if git diff --cached --quiet; then
          echo "No new fallback posts. Skipping commit."
        else
          git commit -m "chore: auto-update local fallback database [skip ci]"
          git push origin HEAD:${{ github.ref }}
        fi

    - name: Detect package manager
      id: detect-package-manager
      run: |
        if [ -f "${{ github.workspace }}/yarn.lock" ]; then
          echo "manager=yarn" >> $GITHUB_OUTPUT
          echo "command=install" >> $GITHUB_OUTPUT
          echo "runner=yarn" >> $GITHUB_OUTPUT
          exit 0
        elif [ -f "${{ github.workspace }}/package.json" ]; then
          echo "manager=npm" >> $GITHUB_OUTPUT
          echo "command=install" >> $GITHUB_OUTPUT
          echo "runner=npx --no-install" >> $GITHUB_OUTPUT
          exit 0
        else
          echo "Unable to determine package manager" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Setup Pages
      uses: actions/configure-pages@v4
      with:
        static_site_generator: next

    - name: Install Node dependencies
      run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

    - name: Build with Next.js
      run: ${{ steps.detect-package-manager.outputs.runner }} next build

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./out

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
