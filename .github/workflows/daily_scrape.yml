name: Tech News Automation Engine

on:
  schedule:
    # Runs every 3 hours (8 times a day)
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows committing changes to posts.json fallback

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scraper/requirements.txt

    - name: Execute Scraper Pipeline
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      run: python scraper/scraper.py

    - name: Push Database Fallback (if Supabase not used)
      run: |
        git config --global user.name "AetherScraper[bot]"
        git config --global user.email "aetherscraper-bot@users.noreply.github.com"
        
        # Check if posts.json was changed
        git add posts.json
        if git diff --cached --quiet; then
          echo "No new fallback posts. Skipping commit."
        else
          git commit -m "chore: auto-update local fallback database [skip ci]"
          git push origin HEAD:${{ github.ref }}
        fi
